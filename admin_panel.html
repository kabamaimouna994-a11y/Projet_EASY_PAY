<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY-PAY - Connexion</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue: #4c4dfc;
            --blue-dark: #3435d4;
            --text: #2c3e50;
            --muted: #8892a0;
            --light: #f4f6fb;
            --danger: #eb4d4b;
            --success: #2ecc71;
            --border: #e8ecf2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--light);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .left-panel {
            width: 45%;
            background: linear-gradient(145deg, #4c4dfc 0%, #7b5cfa 50%, #3435d4 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        .left-content {
            z-index: 1;
            text-align: center;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 32px;
            color: white;
            letter-spacing: 3px;
            margin-bottom: 50px;
        }

        .lock-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }

        .left-content h2 {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            color: white;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .left-content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            line-height: 1.6;
            max-width: 300px;
        }

        .right-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
        }

        .step {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 380px;
            animation: fadeIn 0.3s ease;
        }

        .step.active {
            display: flex;
        }

        .step-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
            text-align: center;
        }

        .step-sub {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 35px;
            text-align: center;
        }

        .dots {
            display: flex;
            gap: 18px;
            margin: 0 0 35px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-radius: 50%;
            transition: 0.2s;
        }

        .dot.active {
            background: var(--blue);
            border-color: var(--blue);
            transform: scale(1.2);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 280px;
        }

        .num-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--light);
            font-size: 24px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: 0.15s;
            color: var(--text);
        }

        .num-btn:hover {
            background: #e8ecf2;
        }

        .num-btn:active {
            transform: scale(0.93);
        }

        .num-btn.ghost {
            background: transparent;
        }

        .link-btn {
            color: var(--muted);
            cursor: pointer;
            margin-top: 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            background: none;
            font-family: 'DM Sans', sans-serif;
        }

        .link-btn:hover {
            color: var(--blue);
        }

        .input-group {
            width: 100%;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            background: var(--light);
            transition: 0.2s;
            text-align: center;
        }

        input:focus {
            border-color: var(--blue);
            background: white;
        }

        .btn-primary {
            width: 100%;
            padding: 17px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: var(--blue-dark);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toast {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: white;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            z-index: 1000;
        }

        .toast.show {
            bottom: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ══════════════════════════════════════
           RESPONSIVE — TABLETTE  (≤ 900px)
        ══════════════════════════════════════ */
        @media screen and (max-width: 900px) {
            body {
                flex-direction: column;
                overflow: auto;
            }

            .left-panel {
                width: 100%;
                padding: 36px 24px 28px;
                min-height: auto;
                justify-content: center;
            }

            .left-content .logo {
                font-size: 24px;
                margin-bottom: 30px;
            }

            .lock-icon {
                font-size: 60px;
                margin-bottom: 18px;
            }

            .left-content h2 {
                font-size: 26px;
            }

            .left-content p {
                font-size: 14px;
            }

            .right-panel {
                border-radius: 24px 24px 0 0;
                padding: 36px 24px 48px;
                min-height: 60vh;
            }
        }

        /* ══════════════════════════════════════
           RESPONSIVE — MOBILE  (≤ 480px)
        ══════════════════════════════════════ */
        @media screen and (max-width: 480px) {
            .left-panel {
                padding: 24px 18px 20px;
            }

            .left-content .logo {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .lock-icon {
                font-size: 50px;
                margin-bottom: 12px;
            }

            .left-content h2 {
                font-size: 22px;
                margin-bottom: 10px;
            }

            .left-content p {
                font-size: 13px;
            }

            .right-panel {
                padding: 28px 16px 40px;
                border-radius: 20px 20px 0 0;
            }

            .step-title {
                font-size: 22px;
            }

            .numpad {
                width: 250px;
                gap: 12px;
            }

            .num-btn {
                width: 72px;
                height: 72px;
                font-size: 20px;
            }

            .dots {
                gap: 14px;
                margin-bottom: 28px;
            }

            input {
                padding: 13px 15px;
                font-size: 14px;
            }

            .btn-primary {
                padding: 15px;
                font-size: 15px;
            }

            .toast {
                max-width: 90vw;
                white-space: normal;
                text-align: center;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="left-panel">
        <div class="left-content">
            <div class="logo">EASY-PAY</div>
            <div class="lock-icon">🔐</div>
            <h2>Connexion sécurisée</h2>
            <p>Votre code PIN à 4 chiffres protège l'accès à votre compte et vos transactions.</p>
        </div>
    </div>

    <div class="right-panel">
        <div class="toast" id="app-message"></div>

        <!-- ÉTAPE 1 : Saisie PIN -->
        <div id="step-login" class="step active">
            <div class="step-title">Entrez votre PIN</div>
            <p id="welcome-name" class="step-sub">Bonjour 👋</p>
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="numpad">
                <button class="num-btn" onclick="press(1)">1</button>
                <button class="num-btn" onclick="press(2)">2</button>
                <button class="num-btn" onclick="press(3)">3</button>
                <button class="num-btn" onclick="press(4)">4</button>
                <button class="num-btn" onclick="press(5)">5</button>
                <button class="num-btn" onclick="press(6)">6</button>
                <button class="num-btn" onclick="press(7)">7</button>
                <button class="num-btn" onclick="press(8)">8</button>
                <button class="num-btn" onclick="press(9)">9</button>
                <button class="num-btn ghost" style="color:var(--danger);font-size:18px;"
                    onclick="location.href='index.html'">✕</button>
                <button class="num-btn" onclick="press(0)">0</button>
                <button class="num-btn ghost" onclick="del()">←</button>
            </div>
            <button class="link-btn" onclick="showStep('step-verify-phone')">PIN oublié ?</button>
        </div>

        <!-- ÉTAPE 2 : Vérification téléphone (récupération PIN) -->
        <div id="step-verify-phone" class="step">
            <div class="step-title">Récupération</div>
            <div class="step-sub">Saisissez le numéro utilisé lors de l'inscription</div>
            <div class="input-group">
                <label>Téléphone</label>
                <input type="tel" id="input-phone" placeholder="Numéro de téléphone">
            </div>
            <button class="btn-primary" id="btn-verif" onclick="checkPhone()">Suivant →</button>
            <button class="link-btn" onclick="showStep('step-login')">← Retour</button>
        </div>

        <!-- ÉTAPE 3 : Nouveau PIN -->
        <div id="step-new-pin" class="step">
            <div class="step-title">Nouveau PIN</div>
            <div class="step-sub">Choisissez un nouveau code secret à 4 chiffres</div>
            <div class="input-group">
                <label>Nouveau PIN</label>
                <input type="password" id="new-pin" maxlength="4" placeholder="••••"
                    style="letter-spacing:15px;font-size:24px;">
            </div>
            <div class="input-group">
                <label>Confirmer</label>
                <input type="password" id="confirm-pin" maxlength="4" placeholder="••••"
                    style="letter-spacing:15px;font-size:24px;">
            </div>
            <button class="btn-primary" id="btn-reset" onclick="resetPin()">Mettre à jour</button>
        </div>
    </div>

    <script>
        // ============================================================
        // ALIGNEMENT AVEC LES APIs :
        // - api_login_client.php  → POST { telephone, pin }
        //   Retour OK : { success: true, client: { id_user, nom_user, solde_user } }
        //   → Stockage : ep_id_user, ep_nom, ep_solde, is_auth
        //
        // - api_verifier_telephone.php → POST { telephone }
        //   Retour OK : { success: true } si le compte existe
        //
        // - api_reset_pin.php → POST { telephone, nouveau_pin }
        //   Retour OK : { success: true, message }
        // ============================================================
        const API_BASE = 'http://localhost/Projet_easypay/';
        let currentPin = '';
        let isProcessing = false;

        // Téléphone stocké par index.html après validateIdentity()
        const telephone = sessionStorage.getItem('ep_telephone') || '';
        if (telephone) {
            document.getElementById('welcome-name').innerText = 'Bonjour 👋';
        }

        function showMsg(text, type = 'danger') {
            const msgBox = document.getElementById('app-message');
            msgBox.innerText = text;
            msgBox.style.background = type === 'success' ? '#2ecc71' : '#eb4d4b';
            msgBox.classList.add('show');
            setTimeout(() => msgBox.classList.remove('show'), 3000);
        }

        function showStep(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            currentPin = '';
            updateDots();
        }

        function press(n) {
            if (isProcessing || currentPin.length >= 4) return;
            currentPin += n;
            updateDots();
            if (currentPin.length === 4) setTimeout(validerPin, 300);
        }

        function del() { currentPin = currentPin.slice(0, -1); updateDots(); }

        function updateDots() {
            document.querySelectorAll('#step-login .dot').forEach((dot, i) =>
                dot.classList.toggle('active', i < currentPin.length)
            );
        }

        async function validerPin() {
            if (!telephone) {
                showMsg("Aucun numéro de téléphone. Veuillez vous connecter depuis l'accueil.");
                setTimeout(() => location.href = 'index.html', 2500);
                return;
            }

            isProcessing = true;
            try {
                const res = await fetch(API_BASE + 'api_login_client.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // API attend : { telephone, pin }
                    body: JSON.stringify({ telephone, pin: currentPin })
                });
                const data = await res.json();

                if (data.success) {
                    // API retourne : client.{ id_user, nom_user, solde_user }
                    sessionStorage.setItem('is_auth', 'true');
                    sessionStorage.setItem('ep_id_user', data.client.id_user);
                    sessionStorage.setItem('ep_nom', data.client.nom_user);
                    sessionStorage.setItem('ep_solde', data.client.solde_user);
                    window.location.href = 'accueil.html';
                } else {
                    showMsg(data.message || "Code PIN incorrect");
                    currentPin = '';
                    setTimeout(updateDots, 300);
                }
            } catch (e) {
                showMsg("Erreur réseau. Vérifiez que WAMP est démarré.");
                currentPin = '';
                setTimeout(updateDots, 300);
            } finally {
                isProcessing = false;
            }
        }

        async function checkPhone() {
            const phone = document.getElementById('input-phone').value.trim();
            const btn = document.getElementById('btn-verif');

            if (phone.length < 8) { showMsg("Numéro invalide."); return; }
            btn.disabled = true;

            try {
                const res = await fetch(API_BASE + 'api_verifier_telephone.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // API attend : { telephone }
                    body: JSON.stringify({ telephone: phone })
                });
                const data = await res.json();

                if (data.success) {
                    // Stocker le téléphone pour la réinitialisation
                    sessionStorage.setItem('ep_reset_phone', phone);
                    showStep('step-new-pin');
                } else {
                    showMsg("Numéro de téléphone introuvable.");
                }
            } catch (e) {
                showMsg("Erreur réseau.");
            } finally {
                btn.disabled = false;
            }
        }

        async function resetPin() {
            const p1 = document.getElementById('new-pin').value;
            const p2 = document.getElementById('confirm-pin').value;
            const phone = sessionStorage.getItem('ep_reset_phone');
            const btn = document.getElementById('btn-reset');

            // Validations miroir API : 4 chiffres uniquement
            if (p1.length !== 4) { showMsg("Le PIN doit contenir 4 chiffres."); return; }
            if (!/^\d{4}$/.test(p1)) { showMsg("Le PIN ne doit contenir que des chiffres."); return; }
            if (p1 !== p2) { showMsg("Les codes ne correspondent pas."); return; }
            if (!phone) { showMsg("Session expirée."); showStep('step-verify-phone'); return; }

            btn.disabled = true;
            try {
                const res = await fetch(API_BASE + 'api_reset_pin.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // API attend : { telephone, nouveau_pin }
                    body: JSON.stringify({ telephone: phone, nouveau_pin: p1 })
                });
                const data = await res.json();

                if (data.success) {
                    showMsg(data.message || "PIN réinitialisé !", "success");
                    // Remettre le téléphone principal pour la connexion
                    sessionStorage.setItem('ep_telephone', phone);
                    sessionStorage.removeItem('ep_reset_phone');
                    setTimeout(() => showStep('step-login'), 2000);
                } else {
                    showMsg(data.message || "Erreur.");
                }
            } catch (e) {
                showMsg("Erreur réseau.");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
